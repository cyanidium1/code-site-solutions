<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Code-site.art — Сайти для медичних клінік</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #121212;
    overflow-x: hidden;
  }
  .page-iframe {
    display: block;
    width: 100%;
    border: none;
    background: #121212;
  }
</style>
</head>
<body>

<iframe class="page-iframe" data-src="Hero.html" title="Hero"></iframe>
<iframe class="page-iframe" data-src="Reasons.html" title="Reasons"></iframe>
<iframe class="page-iframe" data-src="Case.html" title="Case"></iframe>
<iframe class="page-iframe" data-src="Outcome.html" title="Outcome"></iframe>
<iframe class="page-iframe" data-src="Services.html" title="Services"></iframe>
<iframe class="page-iframe" data-src="Comparison.html" title="Comparison"></iframe>
<iframe class="page-iframe" data-src="Final.html" title="Final"></iframe>

<script>
  // Lazy-load iframes and auto-resize to content height
  const iframes = document.querySelectorAll('.page-iframe');

  function resizeIframe(iframe) {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      const h = Math.max(
        doc.body.scrollHeight,
        doc.documentElement.scrollHeight,
        doc.body.offsetHeight,
        doc.documentElement.offsetHeight
      );
      iframe.style.height = h + 'px';
    } catch (e) { /* same-origin only */ }
  }

  iframes.forEach((iframe) => {
    iframe.style.height = '600px'; // initial
    iframe.addEventListener('load', () => {
      // Initial resize
      resizeIframe(iframe);
      // Resize again after fonts/images load
      setTimeout(() => resizeIframe(iframe), 300);
      setTimeout(() => resizeIframe(iframe), 1200);
      setTimeout(() => resizeIframe(iframe), 2500);
      // Watch for DOM changes
      try {
        const doc = iframe.contentDocument;
        const obs = new ResizeObserver(() => resizeIframe(iframe));
        obs.observe(doc.body);
      } catch (e) {}
    });
    iframe.src = iframe.dataset.src;
  });

  // Also resize on window resize (responsive layout shifts)
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      iframes.forEach(resizeIframe);
    }, 200);
  });
</script>

</body>
</html>
