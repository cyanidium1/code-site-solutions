<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reasons — Desktop · Tablet · Mobile</title>

<style>
  body { margin: 0; background: oklch(0.12 0.005 60); font-family: 'Inter', system-ui, sans-serif; }
  .frames {
    display: flex; gap: 40px; padding: 60px 40px;
    align-items: flex-start; justify-content: center;
    overflow-x: auto; min-height: 100vh;
  }
  .frame-col { display: flex; flex-direction: column; gap: 14px; flex-shrink: 0; }
  .frame-label {
    color: oklch(0.7 0.008 70); font-size: 12px; letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 600;
    display: flex; align-items: center; gap: 10px;
  }
  .frame-label .size {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: oklch(0.5 0.008 70); letter-spacing: 0.04em; text-transform: none;
  }
  .frame-label .dot { width: 6px; height: 6px; border-radius: 50%; background: oklch(0.55 0.18 295); }
  .frame {
    border: 1px solid oklch(1 0 0 / 0.08);
    border-radius: 24px;
    overflow: hidden;
    background: oklch(0.155 0.006 60);
    box-shadow: 0 30px 60px oklch(0 0 0 / 0.5);
  }
  .frame iframe { display: block; border: none; background: transparent; }
  .desktop-frame { width: 1440px; height: 1300px; }
  .desktop-frame iframe { width: 1440px; height: 1300px; }
  .tablet-frame { width: 820px; height: 1500px; border-radius: 32px; }
  .tablet-frame iframe { width: 820px; height: 1500px; }
  .mobile-frame { width: 390px; height: 1700px; border-radius: 40px; }
  .mobile-frame iframe { width: 390px; height: 1700px; }
</style>
</head>
<body>
<div class="frames">
  <div class="frame-col">
    <div class="frame-label"><span class="dot"></span>DESKTOP <span class="size">1440 × 1300</span></div>
    <div class="frame desktop-frame"><iframe src="Reasons.html" title="Desktop"></iframe></div>
  </div>
  <div class="frame-col">
    <div class="frame-label"><span class="dot"></span>TABLET <span class="size">820 × 1500</span></div>
    <div class="frame tablet-frame"><iframe src="Reasons.html" title="Tablet"></iframe></div>
  </div>
  <div class="frame-col">
    <div class="frame-label"><span class="dot"></span>MOBILE <span class="size">390 × 1700</span></div>
    <div class="frame mobile-frame"><iframe src="Reasons.html" title="Mobile"></iframe></div>
  </div>
</div>
</body>
</html>
